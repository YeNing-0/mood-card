<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 星空宇宙</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000010;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }
  body:active { cursor: grabbing; }
  body.pointer { cursor: pointer; }
  canvas { display: block; }

  /* 提示文字 */
  .hint {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.6s ease;
  }

  /* 炸出的消息 */
  .explosion-msg {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    font-size: 20px;
    color: #fff;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(255,200,100,0.8);
    animation: msgFloat 1.5s ease-out forwards;
  }
  @keyframes msgFloat {
    0%   { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
    50%  { transform: translate(-50%,-100%) scale(1.3); opacity: 0.9; }
    100% { transform: translate(-50%,-200%) scale(1); opacity: 0; }
  }

  /* 计数 */
  .counter {
    position: fixed;
    top: 30px;
    right: 30px;
    z-index: 10;
    pointer-events: none;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="hint" id="hint">🖱 拖拽旋转 · 点击星星</div>
<div class="counter" id="counter">💥 <span id="count">0</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== 基础场景 =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 200);
camera.position.set(0, 0, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// 环境光 + 一点暖色光
scene.add(new THREE.AmbientLight(0x111133, 0.3));
const sunLight = new THREE.PointLight(0xffeedd, 1, 60);
sunLight.position.set(0, 0, 0);
scene.add(sunLight);

// ===== 星空粒子背景 =====
const bgStarsGeo = new THREE.BufferGeometry();
const bgStarsCount = 800;
const bgPositions = new Float32Array(bgStarsCount * 3);
const bgColors = new Float32Array(bgStarsCount * 3);
const bgSizes = new Float32Array(bgStarsCount);

for (let i = 0; i < bgStarsCount; i++) {
  // 球形分布
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 40 + Math.random() * 80;
  bgPositions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
  bgPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  bgPositions[i * 3 + 2] = r * Math.cos(phi);

  // 颜色: 白/蓝/紫/金
  const colorChoice = Math.random();
  if (colorChoice < 0.4) {
    bgColors[i * 3] = 0.8 + Math.random() * 0.2;
    bgColors[i * 3 + 1] = 0.8 + Math.random() * 0.2;
    bgColors[i * 3 + 2] = 0.9 + Math.random() * 0.1;
  } else if (colorChoice < 0.65) {
    bgColors[i * 3] = 0.4 + Math.random() * 0.3;
    bgColors[i * 3 + 1] = 0.5 + Math.random() * 0.3;
    bgColors[i * 3 + 2] = 0.8 + Math.random() * 0.2;
  } else if (colorChoice < 0.85) {
    bgColors[i * 3] = 0.6 + Math.random() * 0.3;
    bgColors[i * 3 + 1] = 0.3 + Math.random() * 0.2;
    bgColors[i * 3 + 2] = 0.7 + Math.random() * 0.3;
  } else {
    bgColors[i * 3] = 0.9 + Math.random() * 0.1;
    bgColors[i * 3 + 1] = 0.7 + Math.random() * 0.2;
    bgColors[i * 3 + 2] = 0.3 + Math.random() * 0.3;
  }
  bgSizes[i] = 0.15 + Math.random() * 0.6;
}

bgStarsGeo.setAttribute("position", new THREE.BufferAttribute(bgPositions, 3));
bgStarsGeo.setAttribute("color", new THREE.BufferAttribute(bgColors, 3));
bgStarsGeo.setAttribute("size", new THREE.BufferAttribute(bgSizes, 1));

// 用 Canvas 生成圆形渐变贴图
const starTexCanvas = document.createElement("canvas");
starTexCanvas.width = 32;
starTexCanvas.height = 32;
const sctx = starTexCanvas.getContext("2d");
const gradient = sctx.createRadialGradient(16, 16, 0, 16, 16, 16);
gradient.addColorStop(0, "rgba(255,255,255,1)");
gradient.addColorStop(0.15, "rgba(255,255,255,0.9)");
gradient.addColorStop(0.4, "rgba(255,255,255,0.3)");
gradient.addColorStop(1, "rgba(255,255,255,0)");
sctx.fillStyle = gradient;
sctx.fillRect(0, 0, 32, 32);
const starTex = new THREE.CanvasTexture(starTexCanvas);

const bgStarsMat = new THREE.PointsMaterial({
  size: 0.5,
  map: starTex,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true
});

const bgStars = new THREE.Points(bgStarsGeo, bgStarsMat);
scene.add(bgStars);

// ===== 可点击的彩色星体 =====
const clickableStars = [];
const starColors = [
  0xffdd88, 0xffaa66, 0xff8877, 0x88ccff, 0xaaddff,
  0xcc99ff, 0xffccaa, 0xff7799, 0x99eeff, 0xffee99,
  0xff9966, 0xbbddff, 0xff88bb, 0xddccff, 0xffeecc,
  0xffbb77, 0xaaddff, 0xff99aa, 0xccddff, 0xffcc88,
  0x99bbff, 0xffdd99, 0xeeaaff, 0xbbccff, 0xffbb99
];

// 更大的发光贴图
const glowCanvas = document.createElement("canvas");
glowCanvas.width = 128;
glowCanvas.height = 128;
const gctx = glowCanvas.getContext("2d");
const gGrad = gctx.createRadialGradient(64, 64, 0, 64, 64, 64);
gGrad.addColorStop(0, "rgba(255,255,255,1)");
gGrad.addColorStop(0.05, "rgba(255,255,255,0.95)");
gGrad.addColorStop(0.2, "rgba(255,255,255,0.5)");
gGrad.addColorStop(0.5, "rgba(255,255,255,0.08)");
gGrad.addColorStop(1, "rgba(255,255,255,0)");
gctx.fillStyle = gGrad;
gctx.fillRect(0, 0, 128, 128);
const glowTex = new THREE.CanvasTexture(glowCanvas);

for (let i = 0; i < starColors.length; i++) {
  // 球形分布
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 10 + Math.random() * 20;
  const x = r * Math.sin(phi) * Math.cos(theta);
  const y = r * Math.sin(phi) * Math.sin(theta);
  const z = r * Math.cos(phi);

  // 星体 (小球)
  const starGeo = new THREE.SphereGeometry(0.3 + Math.random() * 0.5, 32, 32);
  const starMat = new THREE.MeshStandardMaterial({
    color: starColors[i],
    emissive: starColors[i],
    emissiveIntensity: 0.7,
    roughness: 0.4,
    metalness: 0.1
  });
  const star = new THREE.Mesh(starGeo, starMat);
  star.position.set(x, y, z);
  star.userData = {
    id: i,
    color: starColors[i],
    baseEmissive: 0.7,
    pulseOffset: Math.random() * Math.PI * 2,
    pulseSpeed: 0.5 + Math.random() * 1.5,
    orbitRadius: r,
    orbitTheta: theta,
    orbitPhi: phi,
    orbitSpeed: 0.02 + Math.random() * 0.06,
    clicked: false
  };
  scene.add(star);
  clickableStars.push(star);

  // 光晕 (Sprite)
  const spriteMat = new THREE.SpriteMaterial({
    map: glowTex,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.4 + Math.random() * 0.4,
    color: starColors[i]
  });
  const glow = new THREE.Sprite(spriteMat);
  const glowScale = 1.5 + Math.random() * 2;
  glow.scale.set(glowScale, glowScale, 1);
  star.add(glow);
  star.userData.glow = glow;
  star.userData.spriteMat = spriteMat;
}

// ===== 中央核心 =====
const coreGeo = new THREE.SphereGeometry(1.2, 64, 64);
const coreMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  emissive: 0xffeedd,
  emissiveIntensity: 1.5,
  roughness: 0,
  metalness: 0
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// 核心光晕
const coreGlowMat = new THREE.SpriteMaterial({
  map: glowTex,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  opacity: 0.6,
  color: 0xffffff
});
const coreGlow = new THREE.Sprite(coreGlowMat);
coreGlow.scale.set(8, 8, 1);
core.add(coreGlow);

// 光环（粒子环）
const ringGeo = new THREE.BufferGeometry();
const ringCount = 300;
const ringPositions = new Float32Array(ringCount * 3);
for (let i = 0; i < ringCount; i++) {
  const angle = (i / ringCount) * Math.PI * 2;
  const rr = 3.5 + (Math.random() - 0.5) * 0.8;
  ringPositions[i * 3] = Math.cos(angle) * rr;
  ringPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.3;
  ringPositions[i * 3 + 2] = Math.sin(angle) * rr;
}
ringGeo.setAttribute("position", new THREE.BufferAttribute(ringPositions, 3));
const ringMat = new THREE.PointsMaterial({
  size: 0.08,
  map: starTex,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  color: 0xffccaa,
  opacity: 0.6
});
const ring = new THREE.Points(ringGeo, ringMat);
ring.rotation.x = Math.PI / 4;
core.add(ring);

// ===== 鼠标旋转 =====
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotationVel = { x: 0, y: 0 };
let groupRotation = { x: 0, y: 0 };
const mainGroup = new THREE.Group();
// 把所有东西放进 group
scene.remove(bgStars);
bgStars.material = bgStarsMat; // keep ref

// 把所有已有对象加入 group
while (scene.children.length > 0) {
  const child = scene.children[0];
  scene.remove(child);
  mainGroup.add(child);
}
// 重新加入 bgStars
mainGroup.add(bgStars);
scene.add(mainGroup);

renderer.domElement.addEventListener("mousedown", (e) => {
  // 左键拖拽
  if (e.button === 0) {
    isDragging = true;
    prevMouse.x = e.clientX;
    prevMouse.y = e.clientY;
    rotationVel.x = 0;
    rotationVel.y = 0;
    document.body.style.cursor = "grabbing";
  }
});

window.addEventListener("mousemove", (e) => {
  if (!isDragging) {
    // 检测鼠标是否悬停在星星上
    raycaster.setFromCamera(
      new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
      ),
      camera
    );
    const hits = raycaster.intersectObjects(clickableStars);
    document.body.classList.toggle("pointer", hits.length > 0);
    return;
  }
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  rotationVel.x = dy * 0.005;
  rotationVel.y = dx * 0.005;
  groupRotation.x += rotationVel.x;
  groupRotation.y += rotationVel.y;
  prevMouse.x = e.clientX;
  prevMouse.y = e.clientY;
});

window.addEventListener("mouseup", () => {
  isDragging = false;
  document.body.style.cursor = "grab";
});

// 触摸支持
renderer.domElement.addEventListener("touchstart", (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    prevMouse.x = e.touches[0].clientX;
    prevMouse.y = e.touches[0].clientY;
    rotationVel.set(0, 0);
  }
});
renderer.domElement.addEventListener("touchmove", (e) => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  rotationVel.x = dy * 0.005;
  rotationVel.y = dx * 0.005;
  groupRotation.x += rotationVel.x;
  groupRotation.y += rotationVel.y;
  prevMouse.x = e.touches[0].clientX;
  prevMouse.y = e.touches[0].clientY;
});
renderer.domElement.addEventListener("touchend", () => { isDragging = false; });

// ===== 点击检测 =====
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 1.5;

renderer.domElement.addEventListener("click", (e) => {
  // 拖拽了就不触发点击
  if (Math.abs(rotationVel.x) > 0.001 || Math.abs(rotationVel.y) > 0.001) return;

  const mouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickableStars);

  if (hits.length > 0) {
    const star = hits[0].object;
    if (star.userData.clicked) return;
    explodeStar(star, e.clientX, e.clientY);
  }
});

// ===== 爆炸系统 =====
let explosionParticles = [];
let explosionsActive = [];
let boomCount = 0;

function explodeStar(star, screenX, screenY) {
  star.userData.clicked = true;
  boomCount++;
  document.getElementById("count").textContent = boomCount;

  // 获取世界坐标
  const worldPos = new THREE.Vector3();
  star.getWorldPosition(worldPos);

  // 创建粒子
  const particleCount = 40 + Math.floor(Math.random() * 30);
  const color = new THREE.Color(star.userData.color);

  for (let i = 0; i < particleCount; i++) {
    const pGeo = new THREE.SphereGeometry(0.06 + Math.random() * 0.12, 8, 8);
    const pMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
    const particle = new THREE.Mesh(pGeo, pMat);
    particle.position.copy(worldPos);

    const speed = 3 + Math.random() * 8;
    const dir = new THREE.Vector3(
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2
    ).normalize();

    mainGroup.add(particle);
    explosionParticles.push({
      mesh: particle,
      velocity: dir.multiplyScalar(speed),
      life: 1.2 + Math.random() * 1.5,
      age: 0
    });
  }

  // 闪光（缩放后移除）
  const flashGeo = new THREE.SphereGeometry(0.5, 16, 16);
  const flashMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 });
  const flash = new THREE.Mesh(flashGeo, flashMat);
  flash.position.copy(worldPos);
  mainGroup.add(flash);
  explosionsActive.push({ mesh: flash, type: "flash", life: 0.5, age: 0, maxScale: 4 });

  // 隐藏原星体
  star.visible = false;

  // 屏幕文字
  const msgs = ["💥", "✨", "🌟", "💫", "⭐", "🔥"];
  const msg = document.createElement("span");
  msg.className = "explosion-msg";
  msg.textContent = msgs[Math.floor(Math.random() * msgs.length)];
  msg.style.left = screenX + "px";
  msg.style.top = screenY + "px";
  document.body.appendChild(msg);
  setTimeout(() => msg.remove(), 1600);

  // 3 秒后重生
  setTimeout(() => {
    star.userData.clicked = false;
    star.visible = true;
    // 略微改变颜色
    const newColor = starColors[Math.floor(Math.random() * starColors.length)];
    star.material.color.set(newColor);
    star.material.emissive.set(newColor);
    star.userData.color = newColor;
    star.userData.glow.material.color.set(newColor);
    star.userData.spriteMat.color.set(newColor);

    // 重生粒子效果
    const respawnPos = new THREE.Vector3();
    star.getWorldPosition(respawnPos);
    for (let i = 0; i < 15; i++) {
      const pGeo = new THREE.SphereGeometry(0.04, 6, 6);
      const pMat = new THREE.MeshBasicMaterial({ color: newColor, transparent: true, opacity: 1 });
      const p = new THREE.Mesh(pGeo, pMat);
      p.position.copy(respawnPos);
      const spd = 1 + Math.random() * 3;
      const d = new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2).normalize();
      mainGroup.add(p);
      explosionParticles.push({ mesh: p, velocity: d.multiplyScalar(spd * -1), life: 0.6 + Math.random() * 0.5, age: 0, shrink: true });
    }
  }, 3000);
}

// ===== 动画循环 =====
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const t = performance.now() * 0.001;

  // 惯性旋转
  if (!isDragging) {
    groupRotation.x += rotationVel.x;
    groupRotation.y += rotationVel.y;
    rotationVel.x *= 0.95;
    rotationVel.y *= 0.95;
  }
  mainGroup.rotation.x = groupRotation.x;
  mainGroup.rotation.y = groupRotation.y;

  // 背景星空微微自转
  bgStars.rotation.y += dt * 0.03;
  bgStars.rotation.x += dt * 0.01;

  // 光环旋转
  ring.rotation.z += dt * 0.3;

  // 星体呼吸脉动 + 缓慢轨道
  clickableStars.forEach(star => {
    if (!star.visible) return;

    // 呼吸
    const pulse = 1 + Math.sin(t * star.userData.pulseSpeed + star.userData.pulseOffset) * 0.15;
    star.scale.setScalar(pulse);
    star.userData.glow.scale.setScalar((1.5 + Math.random() * 0.1) * pulse);

    // 微弱轨道运动
    star.userData.orbitTheta += star.userData.orbitSpeed * dt * 0.3;
    const r = star.userData.orbitRadius;
    const theta = star.userData.orbitTheta;
    const phi = star.userData.orbitPhi;
    star.position.x = r * Math.sin(phi) * Math.cos(theta);
    star.position.y = r * Math.sin(phi) * Math.sin(theta);
    star.position.z = r * Math.cos(phi);
  });

  // 核心脉动
  const corePulse = 1 + Math.sin(t * 1.5) * 0.1;
  core.scale.setScalar(corePulse);
  core.material.emissiveIntensity = 1.2 + Math.sin(t * 2) * 0.5;

  // 更新爆炸粒子
  for (let i = explosionParticles.length - 1; i >= 0; i--) {
    const p = explosionParticles[i];
    p.age += dt;
    if (p.age >= p.life) {
      mainGroup.remove(p.mesh);
      p.mesh.geometry.dispose();
      p.mesh.material.dispose();
      explosionParticles.splice(i, 1);
      continue;
    }
    const progress = p.age / p.life;
    p.mesh.position.add(p.velocity.clone().multiplyScalar(dt * (1 - progress)));

    if (p.shrink) {
      p.mesh.scale.setScalar(1 - progress);
    }
    p.mesh.material.opacity = 1 - progress;
  }

  // 更新闪光
  for (let i = explosionsActive.length - 1; i >= 0; i--) {
    const ex = explosionsActive[i];
    ex.age += dt;
    const progress = ex.age / ex.life;
    if (progress >= 1) {
      mainGroup.remove(ex.mesh);
      ex.mesh.geometry.dispose();
      ex.mesh.material.dispose();
      explosionsActive.splice(i, 1);
      continue;
    }
    if (ex.type === "flash") {
      const scale = 0.5 + progress * (ex.maxScale - 0.5);
      ex.mesh.scale.setScalar(scale);
      ex.mesh.material.opacity = 1 - progress;
    }
  }

  // 隐藏提示文字
  if (boomCount > 0) {
    const hintEl = document.getElementById("hint");
    if (hintEl.style.opacity !== "0") {
      hintEl.style.transition = "opacity 1.5s ease";
      hintEl.style.opacity = "0";
    }
  }

  renderer.render(scene, camera);
}

// ===== 响应式 =====
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===== 启动 =====
animate();
</script>
</body>
</html>
