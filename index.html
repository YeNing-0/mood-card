<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 今日心情小卡片</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fce38a, #f38181, #aa96da, #a8e6cf);
    background-size: 400% 400%;
    transition: background-position 1.5s ease;
    overflow: hidden;
  }

  /* 浮动泡泡背景 */
  .bubbles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: floatUp var(--dur) ease-in infinite;
    animation-delay: var(--delay);
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) scale(0); opacity: 0; }
    10%  { opacity: 0.15; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* 主卡片 */
  .card-container {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 440px;
  }
  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 48px 36px 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(255,255,255,0.3);
    text-align: center;
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  /* 卡片顶部色条 */
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    transition: background 0.6s ease;
  }

  /* 日期 */
  .date {
    font-size: 14px;
    color: #999;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  /* 心情 emoji */
  .mood-emoji {
    font-size: 80px;
    line-height: 1;
    margin: 16px 0 8px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: inline-block;
  }
  .mood-emoji.bounce {
    animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes bounceIn {
    0%   { transform: scale(0.3); opacity: 0; }
    50%  { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* 心情标签 */
  .mood-label {
    font-size: 28px;
    font-weight: 700;
    color: #333;
    margin-bottom: 4px;
    transition: color 0.5s ease;
  }

  /* 语录 */
  .quote {
    font-size: 15px;
    color: #666;
    line-height: 1.7;
    margin: 12px 0 24px;
    min-height: 52px;
    transition: all 0.4s ease;
  }

  /* 按钮区 */
  .mood-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  .mood-btn {
    border: none;
    padding: 12px 20px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    color: #555;
    background: #f0f0f0;
    position: relative;
    overflow: hidden;
  }
  .mood-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  }
  .mood-btn:active {
    transform: translateY(0px);
  }
  .mood-btn.active {
    color: #fff;
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  }
  /* 各按钮激活色 */
  .mood-btn.happy.active    { background: linear-gradient(135deg, #f6d365, #fda085); }
  .mood-btn.calm.active     { background: linear-gradient(135deg, #a8e6cf, #7ec8e3); color: #2c5f5b; }
  .mood-btn.energetic.active{ background: linear-gradient(135deg, #f093fb, #f5576c); }
  .mood-btn.sad.active      { background: linear-gradient(135deg, #b8c6db, #8e9eab); }
  .mood-btn.grateful.active { background: linear-gradient(135deg, #ffeaa7, #fab1a0); color: #8b5e3c; }
  .mood-btn.adventurous.active{ background: linear-gradient(135deg, #4facfe, #00f2fe); color: #fff; }

  /* 随机按钮 */
  .random-btn {
    margin-top: 20px;
    border: 2px dashed #ddd;
    background: transparent;
    padding: 10px 28px;
    border-radius: 50px;
    font-size: 14px;
    color: #999;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .random-btn:hover {
    border-color: #aaa;
    color: #666;
    transform: scale(1.04);
  }

  /* ✨ 粒子飞散 */
  .spark {
    position: fixed;
    pointer-events: none;
    z-index: 99;
    font-size: 24px;
    animation: sparkFly 1s ease-out forwards;
  }
  @keyframes sparkFly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
  }

  /* 🎵 音乐指示器 */
  .music-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    height: 24px;
    margin: 4px 0 0;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .music-indicator.playing { opacity: 1; }
  .music-note {
    font-size: 14px;
    animation: none;
  }
  .music-indicator.playing .music-note {
    animation: noteBounce 0.6s ease-in-out infinite;
  }
  @keyframes noteBounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }
  .wave-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 16px;
  }
  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: #ccc;
    transition: background 0.5s ease;
  }
  .music-indicator.playing .wave-bar {
    animation: waveJump var(--wavedur) ease-in-out infinite;
    animation-delay: var(--wavedelay);
  }
  @keyframes waveJump {
    0%, 100% { height: 4px;  }
    25%      { height: 14px; }
    50%      { height: 7px;  }
    75%      { height: 16px; }
  }
</style>
</head>
<body>

<!-- 浮动泡泡 -->
<div class="bubbles" id="bubbles"></div>

<!-- 主卡片 -->
<div class="card-container">
  <div class="card" id="card">
    <div class="date" id="date"></div>
    <div class="mood-emoji" id="moodEmoji">😊</div>
    <div class="music-indicator" id="musicIndicator">
      <span class="music-note">🎵</span>
      <span class="wave-bars" id="waveBars"></span>
    </div>
    <div class="mood-label" id="moodLabel">开心</div>
    <div class="quote" id="quote">今天是个好日子，阳光正好，微风不燥。</div>

    <div class="mood-buttons">
      <button class="mood-btn happy active"    data-mood="happy">😊 开心</button>
      <button class="mood-btn calm"            data-mood="calm">😌 平静</button>
      <button class="mood-btn energetic"       data-mood="energetic">⚡ 充满能量</button>
      <button class="mood-btn sad"             data-mood="sad">🥲 有点emo</button>
      <button class="mood-btn grateful"        data-mood="grateful">🙏 感恩</button>
      <button class="mood-btn adventurous"     data-mood="adventurous">🚀 冒险</button>
    </div>

    <button class="random-btn" id="randomBtn">🎲 随机心情</button>
  </div>
</div>

<script>
// ===== 心情数据 =====
const moods = {
  happy: {
    emoji: "😊",
    label: "开心",
    quotes: [
      "今天是个好日子，阳光正好，微风不燥。",
      "笑起来的时候，整个世界都亮了。",
      "快乐不需要理由，就像猫追自己的尾巴。",
      "把今天的开心存起来，以后可以慢慢花。"
    ],
    bg: "linear-gradient(135deg, #fce38a, #f38181, #fce38a)",
    cardBar: "linear-gradient(90deg, #f6d365, #fda085)"
  },
  calm: {
    emoji: "😌",
    label: "平静",
    quotes: [
      "湖面如镜，倒映着云和远山。",
      "深呼吸，这口气里装着一整片森林。",
      "不赶时间的时候，时间也放慢了脚步。",
      "安静是一种力量，像水一样柔软但能穿石。"
    ],
    bg: "linear-gradient(135deg, #a8e6cf, #dcedc1, #a8e6cf)",
    cardBar: "linear-gradient(90deg, #a8e6cf, #88d8b0)"
  },
  energetic: {
    emoji: "⚡",
    label: "充满能量",
    quotes: [
      "电量满格！今天要像火箭一样往前冲。",
      "没有什么是一杯咖啡和一个决心解决不了的。",
      "把天花板当成地板——今天的起点就是昨天够不到的地方。",
      "冲！不是因为有希望才坚持，是坚持了才有希望。"
    ],
    bg: "linear-gradient(135deg, #f093fb, #f5576c, #f093fb)",
    cardBar: "linear-gradient(90deg, #f093fb, #f5576c)"
  },
  sad: {
    emoji: "🥲",
    label: "有点emo",
    quotes: [
      "有时候，允许自己不开心，也是一种对自己的温柔。",
      "雨会停，云会散，心情也是。",
      "没关系，今天先休息一下，明天再出发。",
      "悲伤不是软弱，是你心里还有重要的东西。"
    ],
    bg: "linear-gradient(135deg, #b8c6db, #c3cfe2, #b8c6db)",
    cardBar: "linear-gradient(90deg, #8e9eab, #a8b5c2)"
  },
  grateful: {
    emoji: "🙏",
    label: "感恩",
    quotes: [
      "谢谢今天遇到的所有善意，大也好，小也好。",
      "幸福不是你拥有的多，而是你计较的少。",
      "一杯热茶、一个微笑、一句问候——生活已经很好了。",
      "说一声谢谢，就像在心里点亮一盏灯。"
    ],
    bg: "linear-gradient(135deg, #ffeaa7, #fab1a0, #ffeaa7)",
    cardBar: "linear-gradient(90deg, #ffeaa7, #fab1a0)"
  },
  adventurous: {
    emoji: "🚀",
    label: "冒险",
    quotes: [
      "勇敢不是不害怕，而是害怕也要迈出那一步。",
      "未知是最好玩的游戏地图。",
      "舒适区很温暖，但外面有整个宇宙。",
      "最有趣的故事，都从'要不试试？'开始。"
    ],
    bg: "linear-gradient(135deg, #4facfe, #00f2fe, #4facfe)",
    cardBar: "linear-gradient(90deg, #4facfe, #00f2fe)"
  }
};

// ===== 🎵 音乐引擎 =====
let audioCtx = null;
let musicTimer = null;
let activeOscillators = [];

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

// 播放一个音符
function playNote(freq, startTime, duration, type, gainVal, pan) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const panner = pan !== undefined ? ctx.createStereoPanner() : null;

  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);

  const attack = Math.min(0.06, duration * 0.3);
  const release = Math.min(0.3, duration * 0.4);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(gainVal, startTime + attack);
  gain.gain.setValueAtTime(gainVal, startTime + duration - release);
  gain.gain.linearRampToValueAtTime(0, startTime + duration);

  osc.connect(gain);
  if (panner) {
    panner.pan.setValueAtTime(pan, startTime);
    gain.connect(panner);
    panner.connect(ctx.destination);
  } else {
    gain.connect(ctx.destination);
  }

  osc.start(startTime);
  osc.stop(startTime + duration + 0.1);
  activeOscillators.push(osc);
}

// 播放持续音（pad/drone）
function playDrone(freqs, startTime, duration, type, gainVal) {
  freqs.forEach(f => playNote(f, startTime, duration, type, gainVal / freqs.length));
}

function stopMusic() {
  if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
  activeOscillators.forEach(o => { try { o.stop(); } catch(e) {} });
  activeOscillators = [];
  document.getElementById("musicIndicator").classList.remove("playing");
}

function playMoodMusic(moodKey) {
  stopMusic();
  const ctx = getAudioCtx();

  // 某些浏览器需要用户手势后才能启动 AudioContext
  if (ctx.state === "suspended") ctx.resume();

  const now = ctx.currentTime;
  const DUR = 10; // 固定 10 秒
  const barColors = {
    happy: "#fda085", calm: "#88d8b0", energetic: "#f5576c",
    sad: "#a8b5c2", grateful: "#fab1a0", adventurous: "#00f2fe"
  };

  // 更新波形条颜色
  document.querySelectorAll(".wave-bar").forEach(b => {
    b.style.background = barColors[moodKey] || "#ccc";
  });
  document.getElementById("musicIndicator").classList.add("playing");

  // 10 秒后自动停止
  musicTimer = setTimeout(() => {
    stopMusic();
  }, DUR * 1000 + 200);

  switch (moodKey) {

    case "happy": {
      // C 大调欢快旋律 - 三角波
      const melody = [
        // 小节 1-2: 上行
        [262,0,0.22], [330,0.25,0.22], [392,0.5,0.22], [523,0.75,0.3],
        [392,1.1,0.22], [330,1.35,0.22], [262,1.6,0.22], [294,1.85,0.22],
        // 小节 3-4: 跳跃
        [330,2.15,0.35], [392,2.55,0.22], [523,2.8,0.22], [659,3.05,0.4],
        [523,3.5,0.22], [440,3.75,0.22], [392,4.0,0.22], [330,4.25,0.35],
        // 小节 5-6
        [262,4.65,0.22], [294,4.9,0.22], [330,5.15,0.22], [392,5.4,0.22],
        [330,5.65,0.22], [392,5.9,0.22], [523,6.15,0.35],
        [440,6.55,0.22], [392,6.8,0.22], [330,7.05,0.22], [294,7.3,0.35],
        // 小节 7-8: 结束
        [262,7.7,0.4], [330,8.15,0.22], [392,8.4,0.22], [523,8.65,0.5],
        [392,9.2,0.3], [262,9.55,0.4]
      ];
      melody.forEach(([freq, start, dur]) => playNote(freq, now + start, dur, "triangle", 0.15));
      // 轻快的低音节奏
      for (let i = 0; i < 20; i++) {
        playNote(131, now + i * 0.5, 0.12, "triangle", 0.06);
      }
      break;
    }

    case "calm": {
      // 环境音 - 正弦波叠加大三和弦 C3+G3+E4
      playDrone([131, 196, 330], now, DUR, "sine", 0.08);
      // 缓慢的高音点缀
      [262, 294, 330, 392, 330, 294, 262].forEach((freq, i) => {
        playNote(freq, now + i * 1.4, 1.2, "sine", 0.05);
      });
      // 偶尔的泛音
      playNote(523, now + 2, 2.5, "sine", 0.03);
      playNote(440, now + 5, 2.5, "sine", 0.03);
      playNote(659, now + 7.5, 2.0, "sine", 0.025);
      break;
    }

    case "energetic": {
      // 驱动节奏 - 锯齿波
      const bassline = [262,262,330,262, 392,330,262,262, 294,294,330,294, 392,330,294,294];
      bassline.forEach((freq, i) => {
        playNote(freq, now + i * 0.22, 0.18, "sawtooth", 0.08);
      });
      // 高音打击感
      for (let i = 0; i < 32; i++) {
        if (i % 4 === 0) playNote(523, now + i * 0.22, 0.08, "square", 0.04);
        if (i % 8 === 0) playNote(659, now + i * 0.22, 0.1, "square", 0.05);
      }
      // 上升音效
      playNote(392, now + 7.0, 0.15, "sawtooth", 0.1);
      playNote(440, now + 7.15, 0.15, "sawtooth", 0.1);
      playNote(523, now + 7.3, 0.15, "sawtooth", 0.1);
      playNote(659, now + 7.45, 0.15, "sawtooth", 0.1);
      playNote(784, now + 7.6, 0.4, "sawtooth", 0.12);
      break;
    }

    case "sad": {
      // D 小调忧伤 - 柔和正弦波
      const melody = [
        [294,0,0.5], [349,0.55,0.4], [440,1.0,0.6],
        [349,1.65,0.4], [294,2.1,0.5], [262,2.65,0.7],
        [294,3.4,0.5], [330,3.95,0.4], [349,4.4,0.6],
        [294,5.05,0.5], [262,5.6,0.5], [247,6.15,0.8],
        [262,7.0,0.5], [294,7.55,0.4], [349,8.0,0.5],
        [294,8.55,0.5], [262,9.1,0.7]
      ];
      melody.forEach(([freq, start, dur]) => playNote(freq, now + start, dur, "sine", 0.12));
      // 低沉的背景
      playDrone([147, 175], now, DUR, "sine", 0.04);
      break;
    }

    case "grateful": {
      // 温暖的 Cmaj7 琶音 - 三角波
      const arp = [262,330,392,494, 392,330,262,330, 392,494,523,494, 392,330,262];
      for (let rep = 0; rep < 5; rep++) {
        arp.forEach((freq, i) => {
          playNote(freq, now + rep * 2.0 + i * 0.13, 0.15, "triangle", 0.1, (i % 2) * 0.4 - 0.2);
        });
      }
      // 温暖的低音根音
      for (let i = 0; i < 5; i++) {
        playNote(131, now + i * 2.0, 1.8, "triangle", 0.07);
      }
      break;
    }

    case "adventurous": {
      // 上升探索 - 锯齿波 + 滑音感
      const risingNotes = [262,294,330,349,392,440,494,523,587,659,698,784];
      risingNotes.forEach((freq, i) => {
        playNote(freq, now + i * 0.55, 0.4, "sawtooth", 0.08, (i % 3 - 1) * 0.3);
      });
      // 低音脉冲推动感
      for (let i = 0; i < 13; i++) {
        playNote(131, now + i * 0.55, 0.2, "triangle", 0.08);
      }
      // 高潮鼓点感
      [523,587,659,698,784,880].forEach((freq, i) => {
        playNote(freq, now + 7.0 + i * 0.4, 0.25, "square", 0.06);
      });
      break;
    }
  }
}

// ===== 页面元素 =====
const body     = document.body;
const card     = document.getElementById("card");
const dateEl   = document.getElementById("date");
const emojiEl  = document.getElementById("moodEmoji");
const labelEl  = document.getElementById("moodLabel");
const quoteEl  = document.getElementById("quote");
const buttons  = document.querySelectorAll(".mood-btn");
const randomBtn = document.getElementById("randomBtn");

// ===== 设置日期 =====
function setDate() {
  const now = new Date();
  const weekdays = ["日","一","二","三","四","五","六"];
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  const w = weekdays[now.getDay()];
  dateEl.textContent = `${y}年${m}月${d}日 · 星期${w}`;
}
setDate();

// ===== 切换心情 =====
function setMood(moodKey) {
  const mood = moods[moodKey];

  // 更新显示
  emojiEl.textContent = mood.emoji;
  labelEl.textContent = mood.label;
  // 随机选一条语录
  const randomQuote = mood.quotes[Math.floor(Math.random() * mood.quotes.length)];
  quoteEl.textContent = randomQuote;

  // emoji 弹跳动画
  emojiEl.classList.remove("bounce");
  void emojiEl.offsetWidth; // 强制重绘
  emojiEl.classList.add("bounce");

  // 背景渐变
  body.style.background = mood.bg;
  body.style.backgroundSize = "400% 400%";
  body.style.backgroundPosition = "0% 50%";
  setTimeout(() => { body.style.backgroundPosition = "100% 50%"; }, 50);

  // 卡片顶部色条
  card.style.setProperty("--bar-color", mood.cardBar);
  card.querySelector("::before"); // can't do pseudo via JS, so use a custom property
  // 这不够优雅，我换种方式——给 card 加 data 属性，用 CSS 匹配
  card.setAttribute("data-mood", moodKey);

  // 按钮激活状态
  buttons.forEach(btn => {
    btn.classList.remove("active");
    if (btn.dataset.mood === moodKey) btn.classList.add("active");
  });
}

// 卡片色条用 JS 直接操作（伪元素无法用 JS 改，改用内联 style 注入）
function updateCardBar(moodKey) {
  const barColors = {
    happy:       "linear-gradient(90deg, #f6d365, #fda085)",
    calm:        "linear-gradient(90deg, #a8e6cf, #88d8b0)",
    energetic:   "linear-gradient(90deg, #f093fb, #f5576c)",
    sad:         "linear-gradient(90deg, #8e9eab, #a8b5c2)",
    grateful:    "linear-gradient(90deg, #ffeaa7, #fab1a0)",
    adventurous: "linear-gradient(90deg, #4facfe, #00f2fe)"
  };
  // 在 card 的 style 里存 bar 颜色，让 ::before 引用不了 inline var
  // 简单方案：直接建一个 style 标签注入
  let styleTag = document.getElementById("dynamic-bar-style");
  if (!styleTag) {
    styleTag = document.createElement("style");
    styleTag.id = "dynamic-bar-style";
    document.head.appendChild(styleTag);
  }
  styleTag.textContent = `.card::before { background: ${barColors[moodKey]} !important; }`;
}

// 包装 setMood
const originalSetMood = setMood;
setMood = function(moodKey) {
  originalSetMood(moodKey);
  updateCardBar(moodKey);
  playMoodMusic(moodKey);
};

// 初始化
updateCardBar("happy");
body.style.background = moods.happy.bg;
body.style.backgroundSize = "400% 400%";

// ===== 按钮点击事件 =====
buttons.forEach(btn => {
  btn.addEventListener("click", function(e) {
    setMood(this.dataset.mood);
    spawnSparks(e.clientX, e.clientY, this.dataset.mood);
  });
});

// ===== 随机心情 =====
randomBtn.addEventListener("click", function(e) {
  const keys = Object.keys(moods);
  const randomKey = keys[Math.floor(Math.random() * keys.length)];
  setMood(randomKey);
  spawnSparks(e.clientX, e.clientY, randomKey);
});

// ===== ✨ 粒子特效 =====
function spawnSparks(x, y, moodKey) {
  const sparkEmojis = {
    happy:       ["✨","🌟","💛","⭐"],
    calm:        ["🌿","💧","🍃","🫧"],
    energetic:   ["⚡","🔥","💥","💫"],
    sad:         ["💧","🌧️","🫧","☁️"],
    grateful:    ["💖","🌸","🕊️","✨"],
    adventurous: ["🚀","🌠","💫","🎯"]
  };
  const emojis = sparkEmojis[moodKey] || ["✨"];
  const count = 12;

  for (let i = 0; i < count; i++) {
    const spark = document.createElement("span");
    spark.className = "spark";
    spark.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    spark.style.left = x + "px";
    spark.style.top  = y + "px";
    // 随机飞散方向和距离
    const angle = Math.random() * Math.PI * 2;
    const distance = 60 + Math.random() * 100;
    spark.style.setProperty("--sx", Math.cos(angle) * distance + "px");
    spark.style.setProperty("--sy", Math.sin(angle) * distance - 40 + "px");
    document.body.appendChild(spark);

    // 动画结束后移除
    spark.addEventListener("animationend", () => spark.remove());
  }
}

// ===== 生成浮动泡泡 =====
function createBubbles() {
  const bubblesContainer = document.getElementById("bubbles");
  const colors = ["#fce38a","#f38181","#95e1d3","#aa96da","#f8b500","#4facfe","#f093fb","#ffeaa7"];
  for (let i = 0; i < 18; i++) {
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    const size = 30 + Math.random() * 80;
    bubble.style.width  = size + "px";
    bubble.style.height = size + "px";
    bubble.style.left   = Math.random() * 100 + "%";
    bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    bubble.style.setProperty("--dur", (8 + Math.random() * 12) + "s");
    bubble.style.setProperty("--delay", Math.random() * 12 + "s");
    bubblesContainer.appendChild(bubble);
  }
}
// ===== 生成波形条 =====
function createWaveBars() {
  const container = document.getElementById("waveBars");
  for (let i = 0; i < 7; i++) {
    const bar = document.createElement("span");
    bar.className = "wave-bar";
    bar.style.setProperty("--wavedur", (0.4 + Math.random() * 0.6) + "s");
    bar.style.setProperty("--wavedelay", (Math.random() * 0.3) + "s");
    container.appendChild(bar);
  }
}
createWaveBars();
createBubbles();
</script>
